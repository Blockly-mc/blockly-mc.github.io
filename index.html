<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC Script Builder</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@400;600;700;800;900&display=swap');

:root {
  --bg: #0c1118;
  --panel: #131b26;
  --panel2: #182030;
  --panel3: #1e293b;
  --border: #243447;
  --border2: #2d4060;
  --text: #dde8f8;
  --muted: #5a7a9a;
  --accent: #38bdf8;
  --accent2: #0ea5e9;
  --grass: #4ade80;
  --gold: #fbbf24;
  --red: #f87171;
  --purple: #c084fc;
  --orange: #fb923c;
  --teal: #2dd4bf;
  --pink: #f472b6;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ─────────────────────────────── */
header {
  background: var(--panel);
  border-bottom: 2px solid var(--border);
  padding: 0 12px;
  height: 50px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  z-index: 200;
}

.logo {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  color: var(--accent);
  text-shadow: 0 0 16px rgba(56,189,248,.5);
  white-space: nowrap;
}
.logo em { color: var(--grass); font-style: normal; }

.divider { width: 1px; height: 26px; background: var(--border); margin: 0 4px; }

.tag {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: .5px;
}

header .sp { flex: 1; }

.hbtn {
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--text);
  padding: 5px 12px;
  border-radius: 6px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
  display: flex; align-items: center; gap: 5px;
  white-space: nowrap;
}
.hbtn:hover { border-color: var(--accent); color: var(--accent); background: rgba(56,189,248,.06); }
.hbtn.prim { background: var(--accent); border-color: var(--accent); color: #060d14; }
.hbtn.prim:hover { background: #7dd3fc; }
.hbtn.success { border-color: var(--grass); color: var(--grass); }
.hbtn.success:hover { background: rgba(74,222,128,.08); }

/* ── LAYOUT ──────────────────────────────── */
.app { display: flex; flex: 1; overflow: hidden; }

/* ── PALETTE SIDEBAR ─────────────────────── */
.sidebar {
  width: 220px;
  background: var(--panel);
  border-right: 2px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

.sb-head {
  padding: 8px 10px 6px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.sb-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 6px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.sb-search {
  width: 100%;
  background: var(--panel2);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 5px 9px;
  font-family: 'Nunito', sans-serif;
  font-size: 12px;
  outline: none;
  transition: border-color .15s;
}
.sb-search:focus { border-color: var(--accent); }

.sb-cats { overflow-y: auto; flex: 1; padding: 4px 0 10px; }
.sb-cats::-webkit-scrollbar { width: 3px; }
.sb-cats::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.cat-hdr {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 10px 3px;
  font-size: 9px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  cursor: pointer;
  user-select: none;
}
.cat-hdr:hover { color: var(--text); }
.cat-dot { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }
.cat-arrow { margin-left: auto; font-size: 8px; transition: transform .15s; }
.cat-collapsed .cat-arrow { transform: rotate(-90deg); }

.pal-block {
  display: flex;
  align-items: center;
  gap: 7px;
  margin: 2px 6px;
  padding: 6px 8px;
  border-radius: 6px;
  border: 1.5px solid transparent;
  cursor: grab;
  font-size: 11.5px;
  font-weight: 700;
  user-select: none;
  transition: all .12s;
  line-height: 1.2;
}
.pal-block:hover { transform: translateX(2px); filter: brightness(1.2); }
.pal-block:active { cursor: grabbing; }

.pal-icon {
  width: 18px; height: 18px;
  border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  flex-shrink: 0;
}

/* ── CANVAS ──────────────────────────────── */
.canvas-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.canvas-toolbar {
  padding: 7px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  background: var(--panel);
}

.canvas-toolbar .info { font-size: 11px; color: var(--muted); font-weight: 600; }
.canvas-toolbar .cnt {
  background: var(--accent); color: #060d14;
  font-size: 10px; font-weight: 900;
  padding: 2px 7px; border-radius: 10px; min-width: 22px; text-align: center;
}

.canvas-scroll { flex: 1; overflow-y: auto; padding: 16px; }
.canvas-scroll::-webkit-scrollbar { width: 5px; }
.canvas-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.drop-zone {
  min-height: calc(100vh - 200px);
  border: 2px dashed var(--border);
  border-radius: 10px;
  padding: 12px;
  transition: all .2s;
  position: relative;
}
.drop-zone.dov { border-color: var(--accent); background: rgba(56,189,248,.03); }

.empty-state {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  text-align: center; pointer-events: none;
}
.empty-state .big { font-size: 52px; margin-bottom: 12px; display: block; opacity: .25; }
.empty-state p { color: var(--muted); font-size: 13px; font-weight: 700; }
.empty-state small { color: var(--muted); font-size: 11px; opacity: .5; }

/* ── SCRIPT BLOCKS ───────────────────────── */
.sblock {
  border-radius: 8px;
  margin-bottom: 7px;
  border: 2px solid transparent;
  transition: box-shadow .15s, opacity .15s;
  position: relative;
}
.sblock:hover { box-shadow: 0 0 0 1px rgba(255,255,255,.06); }
.sblock.selected { box-shadow: 0 0 0 2px var(--accent) !important; }
.sblock.drag-src { opacity: .35; }

.bh {
  padding: 7px 10px;
  border-radius: 6px 6px 0 0;
  display: flex; align-items: center; gap: 7px;
  cursor: pointer;
  user-select: none;
}
.bh.no-body { border-radius: 6px; }

.b-icon { font-size: 13px; flex-shrink: 0; }
.b-label { font-weight: 800; font-size: 12px; flex: 1; }

.b-btns { display: flex; gap: 3px; }
.bb {
  background: rgba(0,0,0,.25);
  border: none;
  color: rgba(255,255,255,.6);
  width: 20px; height: 20px;
  border-radius: 4px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  transition: all .1s;
}
.bb:hover { background: rgba(0,0,0,.5); color: #fff; }
.bb.del:hover { color: var(--red); }

.bbody {
  padding: 8px 10px;
  border-radius: 0 0 6px 6px;
  background: rgba(0,0,0,.22);
  display: flex; flex-direction: column; gap: 7px;
}

.field-row { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.field-lbl { font-size: 10px; font-weight: 800; color: rgba(255,255,255,.5); white-space: nowrap; min-width: 58px; }
.fi {
  background: rgba(0,0,0,.3);
  border: 1.5px solid rgba(255,255,255,.1);
  border-radius: 5px;
  color: #fff;
  padding: 3px 7px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  outline: none;
  transition: border-color .15s;
  min-width: 70px;
}
.fi:focus { border-color: rgba(255,255,255,.35); }
.fi.wide { flex: 1; min-width: 160px; }
.fi.code { width: 100%; min-width: 200px; }
.fsel {
  background: rgba(0,0,0,.35);
  border: 1.5px solid rgba(255,255,255,.1);
  border-radius: 5px;
  color: #fff;
  padding: 3px 7px;
  font-family: 'Nunito', sans-serif;
  font-size: 11px;
  font-weight: 700;
  outline: none;
  cursor: pointer;
}
.fsel option { background: #1e293b; }
.fta {
  width: 100%;
  background: rgba(0,0,0,.3);
  border: 1.5px solid rgba(255,255,255,.1);
  border-radius: 5px;
  color: #fff;
  padding: 5px 7px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  outline: none;
  resize: vertical;
  min-height: 52px;
  transition: border-color .15s;
}
.fta:focus { border-color: rgba(255,255,255,.35); }

/* nested */
.nested-wrap { margin-left: 18px; border-left: 2.5px solid rgba(255,255,255,.08); padding-left: 10px; }

.child-zone {
  min-height: 34px;
  border: 1.5px dashed rgba(255,255,255,.1);
  border-radius: 6px;
  padding: 5px;
  transition: all .15s;
  margin-top: 4px;
}
.child-zone.dov { border-color: rgba(255,255,255,.35); background: rgba(255,255,255,.03); }
.child-hint { text-align: center; color: rgba(255,255,255,.2); font-size: 10px; font-weight: 800; padding: 3px; pointer-events: none; }

/* else zone */
.else-label { font-size: 10px; font-weight: 800; color: rgba(255,255,255,.3); padding: 4px 0 2px 2px; }

/* ── CODE OUTPUT PANEL ───────────────────── */
.code-panel {
  width: 360px;
  background: var(--panel);
  border-left: 2px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

.cp-header {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--panel2);
  flex-shrink: 0;
}
.cp-title { font-family: 'Press Start 2P', monospace; font-size: 6px; color: var(--accent); letter-spacing: 1px; }

.lang-tabs { display: flex; gap: 3px; margin-left: auto; }
.ltab {
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--muted);
  padding: 3px 8px;
  border-radius: 4px;
  font-family: 'Nunito', sans-serif;
  font-size: 11px; font-weight: 800;
  cursor: pointer;
  transition: all .12s;
}
.ltab.active { background: var(--accent); border-color: var(--accent); color: #060d14; }
.ltab:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

.code-out {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  line-height: 1.75;
  white-space: pre;
  color: #abb2bf;
  tab-size: 2;
}
.code-out::-webkit-scrollbar { width: 4px; }
.code-out::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* syntax */
.kw { color: #c678dd; }
.fn { color: #61afef; }
.str { color: #98c379; }
.num { color: #d19a66; }
.cm { color: #5c6370; font-style: italic; }
.ty { color: #e5c07b; }
.ev { color: #56c8e8; }
.op { color: #56b6c2; }
.prop { color: #e06c75; }

/* ── EXAMPLES MODAL ──────────────────────── */
.modal-bg {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.modal-bg.open { display: flex; }

.modal {
  background: var(--panel2);
  border: 2px solid var(--border2);
  border-radius: 12px;
  width: 640px;
  max-height: 80vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.modal-head {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.modal-head h2 { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--accent); }
.modal-head .close { margin-left: auto; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; line-height: 1; }
.modal-head .close:hover { color: var(--text); }

.modal-body { overflow-y: auto; padding: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-body::-webkit-scrollbar { width: 4px; }
.modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.example-card {
  background: var(--panel3);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  cursor: pointer;
  transition: all .15s;
}
.example-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.example-card h3 { font-size: 13px; font-weight: 800; margin-bottom: 5px; }
.example-card p { font-size: 11px; color: var(--muted); line-height: 1.5; }
.example-card .ex-tag {
  display: inline-block;
  font-size: 9px; font-weight: 800;
  padding: 2px 6px;
  border-radius: 4px;
  margin-bottom: 6px;
}

/* ── BLOCK THEMES ────────────────────────── */
.t-event    { background:#0f1e35; border-color:#1d4ed8; } .t-event    .bh { background:#132043; } .t-event    .b-label { color:#60a5fa; }
.t-system   { background:#0f2010; border-color:#15803d; } .t-system   .bh { background:#143018; } .t-system   .b-label { color:#4ade80; }
.t-world    { background:#200f0f; border-color:#991b1b; } .t-world    .bh { background:#2d1414; } .t-world    .b-label { color:#f87171; }
.t-entity   { background:#1c1400; border-color:#854d0e; } .t-entity   .bh { background:#2a1f00; } .t-entity   .b-label { color:#fbbf24; }
.t-player   { background:#150d25; border-color:#6d28d9; } .t-player   .bh { background:#1d1232; } .t-player   .b-label { color:#c084fc; }
.t-logic    { background:#0e1c1c; border-color:#0e7490; } .t-logic    .bh { background:#122828; } .t-logic    .b-label { color:#67e8f9; }
.t-var      { background:#0a1c14; border-color:#065f46; } .t-var      .bh { background:#0e2a1a; } .t-var      .b-label { color:#34d399; }
.t-output   { background:#1a0d22; border-color:#7c3aed; } .t-output   .bh { background:#240f32; } .t-output   .b-label { color:#c084fc; }
.t-score    { background:#1c1000; border-color:#92400e; } .t-score    .bh { background:#2a1800; } .t-score    .b-label { color:#fb923c; }
.t-dynprop  { background:#0f1520; border-color:#1e40af; } .t-dynprop  .bh { background:#131c2d; } .t-dynprop  .b-label { color:#93c5fd; }
.t-inv      { background:#1a0f1a; border-color:#86198f; } .t-inv      .bh { background:#240e24; } .t-inv      .b-label { color:#e879f9; }
.t-func     { background:#100f1a; border-color:#4338ca; } .t-func     .bh { background:#181630; } .t-func     .b-label { color:#818cf8; }
.t-struct   { background:#121c10; border-color:#166534; } .t-struct   .bh { background:#182614; } .t-struct   .b-label { color:#86efac; }
.t-form     { background:#1c1414; border-color:#9f1239; } .t-form     .bh { background:#2a1820; } .t-form     .b-label { color:#fb7185; }

/* toast */
.toast {
  position: fixed; bottom: 18px; right: 18px;
  background: var(--panel2); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 9px 14px;
  font-size: 12px; font-weight: 700; z-index: 9999;
  animation: tIn .18s ease; display: flex; align-items: center; gap: 7px;
}
@keyframes tIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.toast.ok { border-color: var(--grass); color: var(--grass); }
.toast.inf { border-color: var(--accent); color: var(--accent); }
.toast.warn { border-color: var(--gold); color: var(--gold); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">⛏ MC<em>Script</em></div>
  <div class="divider"></div>
  <div class="tag">Bedrock Script API Builder</div>
  <div class="sp"></div>
  <div id="bcount" class="cnt" style="margin-right:6px">0</div>
  <button class="hbtn" onclick="undo()">↩ Undo</button>
  <button class="hbtn" onclick="clearAll()">🗑 Clear</button>
  <button class="hbtn" onclick="openExamples()">📦 Examples</button>
  <button class="hbtn success" onclick="exportScript()">💾 Export .ts</button>
  <button class="hbtn prim" onclick="copyCode()">📋 Copy</button>
</header>

<div class="app">
<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sb-head">
    <div class="sb-title">🧱 Block Palette</div>
    <input class="sb-search" id="sbSearch" type="text" placeholder="Search blocks…" oninput="filterPalette(this.value)">
  </div>
  <div class="sb-cats" id="palette"></div>
</div>

<!-- CANVAS -->
<div class="canvas-wrap">
  <div class="canvas-toolbar">
    <span class="info">Script Canvas</span>
    <span class="info">— drag & drop blocks</span>
    <div class="sp"></div>
    <button class="hbtn" style="font-size:11px;padding:4px 10px" onclick="collapseAll()">Collapse All</button>
    <button class="hbtn" style="font-size:11px;padding:4px 10px" onclick="expandAll()">Expand All</button>
  </div>
  <div class="canvas-scroll">
    <div class="drop-zone" id="dz">
      <div class="empty-state" id="es">
        <span class="big">🧱</span>
        <p>Drag blocks to build your script</p>
        <small>Start with an Event or Function block</small>
      </div>
    </div>
  </div>
</div>

<!-- CODE PANEL -->
<div class="code-panel">
  <div class="cp-header">
    <span class="cp-title">GENERATED CODE</span>
    <div class="lang-tabs">
      <button class="ltab active" onclick="setLang('ts',this)">TS</button>
      <button class="ltab" onclick="setLang('js',this)">JS</button>
    </div>
  </div>
  <div class="code-out" id="codeOut"></div>
</div>
</div>

<!-- EXAMPLES MODAL -->
<div class="modal-bg" id="exModal">
  <div class="modal">
    <div class="modal-head">
      <h2>📦 Example Scripts</h2>
      <button class="close" onclick="closeExamples()">×</button>
    </div>
    <div class="modal-body" id="exCards"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  BLOCK DEFINITIONS
// ══════════════════════════════════════════════════════════

const BD = {};

// helper
function def(id, cat, label, theme, fields, hasChildren, gen, hasElse) {
  BD[id] = { cat, label, theme, fields, hasChildren, gen, hasElse: hasElse||false };
}

// ── EVENTS ──────────────────────────────────────────────

def('ev_playerBreakBefore','Events','🔨 Before Player Breaks Block','event',
  [{id:'h',lbl:'Handler',t:'text',def:'ev'}],true,
  (b,l)=>`world.beforeEvents.playerBreakBlock.subscribe((${b.h||'ev'}) => {\n  // .block .player .cancel=true\n${CC(b,l,2)}});`);

def('ev_playerBreakAfter','Events','🔨 After Player Breaks Block','event',
  [{id:'h',lbl:'Handler',t:'text',def:'ev'}],true,
  (b,l)=>`world.afterEvents.playerBreakBlock.subscribe((${b.h||'ev'}) => {\n${CC(b,l,2)}});`);

def('ev_playerPlaceAfter','Events','🟫 After Player Places Block','event',
  [{id:'h',lbl:'Handler',t:'text',def:'ev'}],true,
  (b,l)=>`world.afterEvents.playerPlaceBlock.subscribe((${b.h||'ev'}) => {\n${CC(b,l,2)}});`);

def('ev_chatSendAfter','Events','💬 Chat Message Sent','event',
  [{id:'h',lbl:'Handler',t:'text',def:'ev'}],true,
  (b,l)=>`world.afterEvents.chatSend.subscribe((${b.h||'ev'}) => {\n  // .sender .message\n${CC(b,l,2)}});`);

def('ev_chatSendBefore','Events','💬 Before Chat Send (cancelable)','event',
  [{id:'h',lbl:'Handler',t:'text',def:'ev'}],true,
  (b,l)=>`world.beforeEvents.chatSend.subscribe((${b.h||'ev'}) => {\n  // .cancel=true to block\n${CC(b,l,2)}});`);

def('ev_playerSpawn','Events','🌟 Player Spawns','event',
  [{id:'h',lbl:'Handler',t:'text',def:'ev'}],true,
  (b,l)=>`world.afterEvents.playerSpawn.subscribe((${b.h||'ev'}) => {\n  // .player .initialSpawn\n${CC(b,l,2)}});`);

def('ev_playerLeave','Events','🚪 Player Leaves','event',
  [{id:'h',lbl:'Handler',t:'text',def:'ev'}],true,
  (b,l)=>`world.afterEvents.playerLeave.subscribe((${b.h||'ev'}) => {\n  // .playerId .playerName\n${CC(b,l,2)}});`);

def('ev_entityHurt','Events','💢 Entity Hurt','event',
  [{id:'h',lbl:'Handler',t:'text',def:'ev'}],true,
  (b,l)=>`world.afterEvents.entityHurt.subscribe((${b.h||'ev'}) => {\n  // .hurtEntity .damageSource .damage\n${CC(b,l,2)}});`);

//  STATE & HELPERS
// ══════════════════════════════════════════════════════════

let blocks = [];
let history = [];
let dragSrc = null;
let lang = 'ts';
let bid = 1;

function newBlock(type) {
  const d = BD[type]; if(!d) return null;
  const fields = {};
  (d.fields||[]).forEach(f => { fields[f.id] = f.def||''; });
  return { id:'b'+(bid++), type, fields, children: d.hasChildren ? [] : null, elseChildren: d.hasElse ? [] : null, collapsed:false };
}

function findBlock(id, arr) {
  for(const b of arr) {
    if(b.id===id) return b;
    if(b.children) { const f=findBlock(id,b.children); if(f) return f; }
    if(b.elseChildren) { const f=findBlock(id,b.elseChildren); if(f) return f; }
  }
  return null;
}

function removeBlock(id, arr) {
  const i=arr.findIndex(b=>b.id===id);
  if(i!==-1){arr.splice(i,1);return true;}
  for(const b of arr){
    if(b.children&&removeBlock(id,b.children)) return true;
    if(b.elseChildren&&removeBlock(id,b.elseChildren)) return true;
  }
  return false;
}

function countAll(arr) {
  let n=arr.length;
  arr.forEach(b=>{
    if(b.children) n+=countAll(b.children);
    if(b.elseChildren) n+=countAll(b.elseChildren);
  });
  return n;
}

function isDescendant(b, tid) {
  if(!b.children) return false;
  return b.children.some(c=>c.id===tid||isDescendant(c,tid));
}

function reassignIds(b) {
  b.id='b'+(bid++);
  if(b.children) b.children.forEach(reassignIds);
  if(b.elseChildren) b.elseChildren.forEach(reassignIds);
}

function saveHistory() {
  history.push(JSON.stringify(blocks));
  if(history.length>50) history.shift();
}

function undo() {
  if(!history.length) return toast('Nothing to undo','warn');
  blocks = JSON.parse(history.pop());
  render();
  toast('Undone ↩','inf');
}

//  CODE GENERATION
// ══════════════════════════════════════════════════════════

function CC(block, lang, indent) {
  const arr = block.children || [];
  if(!arr.length) return '';
  const pad=' '.repeat(indent);
  return arr.map(c=>{
    const d=BD[c.type]; if(!d) return '';
    const fields = c.fields||{};
    return d.gen(fields,lang,c).split('\n').map(l=>pad+l).join('\n')+'\n';
  }).join('');
}

function CCElse(block, lang, indent) {
  const arr = block.elseChildren || [];
  if(!arr.length) return '';
  const pad=' '.repeat(indent);
  return arr.map(c=>{
    const d=BD[c.type]; if(!d) return '';
    const fields=c.fields||{};
    return d.gen(fields,lang,c).split('\n').map(l=>pad+l).join('\n')+'\n';
  }).join('');
}

function generateCode() {
  if(!blocks.length) {
    return lang==='ts'
      ? `import { world, system } from "@minecraft/server";\n\n// 🧱 Start building your script!\n// Drag blocks from the left panel.`
      : `import { world, system } from "@minecraft/server";\n\n// 🧱 Start building your script!\n// Drag blocks from the left panel.`;
  }

  const types = getAllTypes(blocks);
  const mcImports = new Set(['world','system']);
  const uiImports = new Set();
  const extraImports = new Set();

  if(types.has('p_setGameMode')) mcImports.add('GameMode');
  if(lang==='ts') {
    if(types.has('w_getDim')||types.has('w_setBlock')||types.has('w_getBlock')) extraImports.add('Dimension');
    if(types.has('w_getPlayers')||types.has('p_sendMsg')||types.has('for_players')) extraImports.add('Player');
    if(types.has('w_spawnEntity')||types.has('ent_applyDmg')) extraImports.add('Entity');
    if(types.has('p_getLocation')) extraImports.add('Vector3');
    if(types.has('inv_setItem')||types.has('inv_addItem')||types.has('w_spawnItem')) extraImports.add('ItemStack');
    if(types.has('sb_getObjective')||types.has('sb_addObjective')) { extraImports.add('ScoreboardObjective'); extraImports.add('ScoreboardParticipant'); }
  }
  if(types.has('inv_setItem')||types.has('inv_addItem')||types.has('w_spawnItem')) mcImports.add('ItemStack');
  if(types.has('p_getHeldItem')) mcImports.add('EquipmentSlot');
  if(types.has('w_setWeather')) mcImports.add('WeatherType');
  if(types.has('form_action')) uiImports.add('ActionFormData');
  if(types.has('form_message')) uiImports.add('MessageFormData');
  if(types.has('form_modal')) uiImports.add('ModalFormData');

  const lines = [];
  lines.push(`import { ${[...mcImports].join(', ')} } from "@minecraft/server";`);
  if(uiImports.size) lines.push(`import { ${[...uiImports].join(', ')} } from "@minecraft/server-ui";`);
  lines.push('');

  const body = blocks.map(b=>{
    const d=BD[b.type]; if(!d) return '';
    const code = d.gen(b.fields||{}, lang, b);
    // if block has else
    if(b.elseChildren && b.elseChildren.length) {
      const elseCode = CCElse(b, lang, 2);
      return code + ' else {\n' + elseCode + '}';
    }
    return code;
  }).join('\n\n');

  return lines.join('\n') + '\n' + body;
}

function getAllTypes(arr) {
  const s=new Set();
  arr.forEach(b=>{
    s.add(b.type);
    if(b.children) getAllTypes(b.children).forEach(t=>s.add(t));
    if(b.elseChildren) getAllTypes(b.elseChildren).forEach(t=>s.add(t));
  });
  return s;
}

function updateCode() {
  const code = generateCode();
  document.getElementById('codeOut').innerHTML = syntaxHL(code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));
  document.getElementById('bcount').textContent = countAll(blocks);
  document.getElementById('es').style.display = blocks.length?'none':'block';
}

function syntaxHL(c) {
  return c
    .replace(/(\/\*[\s\S]*?\*\/)/g,'<span class="cm">$1</span>')
    .replace(/(\/\/.+)/g,'<span class="cm">$1</span>')
    .replace(/\b(import|export|from|const|let|var|if|else|for|of|in|return|try|catch|async|await|true|false|null|undefined|new|this|class|interface|type|enum|switch|case|default|break|while|function)\b/g,'<span class="kw">$1</span>')
    .replace(/\b(world|system)\b/g,'<span class="ev">$1</span>')
    .replace(/("(?:[^"\\]|\\.)*")/g,'<span class="str">$1</span>')
    .replace(/\b(\d+(?:\.\d+)?)\b/g,'<span class="num">$1</span>');
}

const CAT_COLORS = {
  Events:'#60a5fa', System:'#4ade80', World:'#f87171', Entity:'#fbbf24',
  Player:'#c084fc', Scoreboard:'#fb923c', 'Dynamic Props':'#93c5fd',

};

const catCollapsed = {};

function renderPalette(filter='') {
  const cats = {};
  Object.entries(BD).forEach(([k,d])=>{
    if(filter&&!d.label.toLowerCase().includes(filter.toLowerCase())&&!d.cat.toLowerCase().includes(filter.toLowerCase())) return;
    if(!cats[d.cat]) cats[d.cat]=[];
    cats[d.cat].push({k,d});
  });

  const pal = document.getElementById('palette');
  pal.innerHTML='';

  Object.entries(cats).forEach(([cat,items])=>{
    const color=CAT_COLORS[cat]||'#888';
    const collapsed=catCollapsed[cat]&&!filter;

    const hdr=document.createElement('div');
    hdr.className='cat-hdr'+(collapsed?' cat-collapsed':'');
    hdr.innerHTML=`<span class="cat-dot" style="background:${color}"></span>${cat}<span class="cat-arrow">▼</span>`;
    hdr.onclick=()=>{ catCollapsed[cat]=!catCollapsed[cat]; renderPalette(document.getElementById('sbSearch').value); };
    pal.appendChild(hdr);

    if(!collapsed) {
      items.forEach(({k,d})=>{
        const el=document.createElement('div');
        el.className='pal-block';
        el.style.color=color;
        el.style.background=`${color}14`;
        const parts=d.label.split(' ');
        const icon=parts[0]; const name=parts.slice(1).join(' ');
        el.innerHTML=`<span class="pal-icon" style="background:${color}22">${icon}</span>${name}`;
        el.draggable=true;
        el.addEventListener('dragstart',e=>{ dragSrc={type:'palette',blockType:k}; e.dataTransfer.effectAllowed='copy'; el.style.opacity='.4'; });
        el.addEventListener('dragend',()=>el.style.opacity='1');
        el.title=d.label;
        pal.appendChild(el);
      });
    }
  });
}

function filterPalette(v) { renderPalette(v); }

function render() {
  const dz=document.getElementById('dz');
  // Remove all but empty state
  Array.from(dz.children).forEach(c=>{ if(c.id!=='es') c.remove(); });
  blocks.forEach(b=>{ const el=renderBlock(b,blocks,null); dz.appendChild(el); });
  updateCode();
}

function renderBlock(block, sibArr, parentId) {
  const d=BD[block.type];
  if(!d){const e=document.createElement('div'); return e;}

  const wrap=document.createElement('div');
  wrap.className=`sblock t-${d.theme}${block.id===selId?' selected':''}`;
  wrap.dataset.id=block.id;

  const fields=block.fields||{};

  // HEADER
  const bh=document.createElement('div');
  bh.className='bh'+((!d.hasChildren||block.collapsed)&&!d.fields?.length?' no-body':'');

  const parts=d.label.split(' ');
  bh.innerHTML=`<span class="b-icon">${parts[0]}</span><span class="b-label">${parts.slice(1).join(' ')}</span>
  <div class="b-btns">
    ${d.hasChildren?`<button class="bb" onclick="toggleC('${block.id}')" title="Collapse/Expand">${block.collapsed?'▶':'▼'}</button>`:''}
    <button class="bb" onclick="dupBlock('${block.id}','${parentId||''}')" title="Duplicate">⧉</button>
    <button class="bb del" onclick="delBlock('${block.id}')" title="Delete">✕</button>
  </div>`;

  // drag
  bh.draggable=true;
  bh.addEventListener('dragstart',e=>{ e.stopPropagation(); dragSrc={type:'canvas',blockId:block.id,sibArr,parentId}; wrap.classList.add('drag-src'); e.dataTransfer.effectAllowed='move'; });
  bh.addEventListener('dragend',()=>wrap.classList.remove('drag-src'));
  bh.addEventListener('click',e=>{ if(e.target.closest('.bb')) return; selId=block.id===selId?null:block.id; render(); });

  wrap.appendChild(bh);

  if(!block.collapsed) {
    const body=document.createElement('div');
    body.className='bbody';

    // fields
    d.fields.forEach(f=>{
      const row=document.createElement('div');
      row.className='field-row';
      row.innerHTML=`<span class="field-lbl">${f.lbl}</span>`;

      if(f.t==='sel') {
        const sel=document.createElement('select');
        sel.className='fsel';
        f.opts.forEach(o=>{ const opt=document.createElement('option'); opt.value=o; opt.textContent=o; if(fields[f.id]===o) opt.selected=true; sel.appendChild(opt); });
        sel.onchange=()=>{ fields[f.id]=sel.value; updateCode(); };
        row.appendChild(sel);
      } else if(f.t==='textarea') {
        const ta=document.createElement('textarea');
        ta.className='fta';
        ta.value=fields[f.id]||'';
        ta.oninput=()=>{ fields[f.id]=ta.value; updateCode(); };
        row.appendChild(ta);
      } else {
        const inp=document.createElement('input');
        inp.className='fi'+(['cmd','code','cond','val','msg','params','fields','vals','cases','items','key','typ','vt','kt','sub','body','opts','ret','def'].includes(f.id)?' wide':'');
        inp.type=f.t==='num'?'number':'text';
        inp.value=fields[f.id]||'';
        inp.placeholder=f.def||'';
        inp.oninput=()=>{ fields[f.id]=inp.value; updateCode(); };
        row.appendChild(inp);
      }
      body.appendChild(row);
    });

    // children
    if(d.hasChildren && block.children!==null) {
      const nw=document.createElement('div');
      nw.className='nested-wrap';
      block.children.forEach(c=>nw.appendChild(renderBlock(c,block.children,block.id)));

      const cz=document.createElement('div');
      cz.className='child-zone';
      if(!block.children.length) cz.innerHTML='<div class="child-hint">Drop blocks here</div>';
      setupDrop(cz, block.children, block.id);
      nw.appendChild(cz);
      body.appendChild(nw);
    }

    // else children
    if(d.hasElse && block.elseChildren!==null) {
      const el=document.createElement('div');
      el.className='else-label';
      el.textContent='} else {';
      body.appendChild(el);

      const nw2=document.createElement('div');
      nw2.className='nested-wrap';
      block.elseChildren.forEach(c=>nw2.appendChild(renderBlock(c,block.elseChildren,block.id+'_else')));

      const cz2=document.createElement('div');
      cz2.className='child-zone';
      if(!block.elseChildren.length) cz2.innerHTML='<div class="child-hint">Drop else blocks here</div>';
      setupDrop(cz2, block.elseChildren, block.id+'_else');
      nw2.appendChild(cz2);
      body.appendChild(nw2);
    }

    wrap.appendChild(body);
  }

  // drop for reorder
  wrap.addEventListener('dragover',e=>{e.preventDefault();});
  wrap.addEventListener('drop',e=>{
    e.stopPropagation();
    const idx=sibArr.findIndex(b=>b.id===block.id);
    handleDrop(sibArr,parentId,idx);
  });

  return wrap;
}

let selId=null;

function setupDrop(el, arr, pid) {
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('dov');});
  el.addEventListener('dragleave',()=>el.classList.remove('dov'));
  el.addEventListener('drop',e=>{ e.stopPropagation(); el.classList.remove('dov'); handleDrop(arr,pid); });
}

function handleDrop(targetArr, parentId, insertIdx) {
  if(!dragSrc) return;
  saveHistory();

  if(dragSrc.type==='palette') {
    const nb=newBlock(dragSrc.blockType); if(!nb) return;
    if(insertIdx!==undefined) targetArr.splice(insertIdx,0,nb);
    else targetArr.push(nb);
  } else {
    const {blockId,sibArr:srcArr}=dragSrc;
    const srcIdx=srcArr.findIndex(b=>b.id===blockId);
    if(srcIdx===-1) return;
    const [moved]=srcArr.splice(srcIdx,1);
    if(isDescendant(moved,parentId)){srcArr.splice(srcIdx,0,moved);return;}
    if(insertIdx!==undefined){
      const adj=(srcArr===targetArr&&insertIdx>srcIdx)?insertIdx-1:insertIdx;
      targetArr.splice(adj,0,moved);
    } else targetArr.push(moved);
  }
  dragSrc=null;
  render();
}

// Canvas drop zone
const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dov');});
dz.addEventListener('dragleave',e=>{ if(!dz.contains(e.relatedTarget)) dz.classList.remove('dov');});
dz.addEventListener('drop',e=>{
  dz.classList.remove('dov');
  if(e.target===dz||e.target.id==='es'||e.target.closest('.empty-state')) handleDrop(blocks,null);
});

function toggleC(id) { const b=findBlock(id,blocks); if(b){b.collapsed=!b.collapsed;render();} }
function delBlock(id) { saveHistory(); removeBlock(id,blocks); if(selId===id)selId=null; render(); }
function dupBlock(id) {
  saveHistory();
  const b=findBlock(id,blocks); if(!b) return;
  const copy=JSON.parse(JSON.stringify(b)); reassignIds(copy);
  const arr=blocks; // search parent later
  function insertAfter(id,arr){
    const i=arr.findIndex(b=>b.id===id);
    if(i!==-1){arr.splice(i+1,0,copy);return true;}
    for(const b of arr){
      if(b.children&&insertAfter(id,b.children)) return true;
      if(b.elseChildren&&insertAfter(id,b.elseChildren)) return true;
    }
    return false;
  }
  insertAfter(id,blocks);
  render();
}

function collapseAll() { function ca(arr){arr.forEach(b=>{b.collapsed=true;if(b.children)ca(b.children);})} ca(blocks); render(); }
function expandAll() { function ea(arr){arr.forEach(b=>{b.collapsed=false;if(b.children)ea(b.children);})} ea(blocks); render(); }
function clearAll() { saveHistory(); blocks=[]; selId=null; render(); toast('Canvas cleared','inf'); }

function setLang(l,btn) {
  lang=l;
  document.querySelectorAll('.ltab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

}

function copyCode() {

function exportScript() {

  a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(code);
  a.download='script.'+(lang==='ts'?'ts':'js');
  a.click();
  toast('Exported! 💾','ok');
}

function add(type, extraFields={}) {
  const b=newBlock(type); if(!b) return null;
  Object.assign(b.fields, extraFields);
  blocks.push(b);
  return b;
}

function addChild(parent, type, extraFields={}) {
  if(!parent||!parent.children) return null;
  const b=newBlock(type); if(!b) return null;
  Object.assign(b.fields, extraFields);
  parent.children.push(b);
  return b;
}

function addChildToBlock(parent, type, extraFields={}) {
  return addChild(parent, type, extraFields);
}

    card.className='example-card';
    card.innerHTML=`<span class="ex-tag" style="background:${ex.tagColor}22;color:${ex.tagColor}">${ex.tag}</span><h3>${ex.name}</h3><p>${ex.desc}</p>`;
    card.onclick=()=>{ closeExamples(); loadExample(i); };
    cards.appendChild(card);
  });
  document.getElementById('exModal').classList.add('open');
}

function closeExamples() { document.getElementById('exModal').classList.remove('open'); }
document.getElementById('exModal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeExamples(); });

function loadExample(idx) {
  saveHistory();
  blocks=[];
  bid=1;
  selId=null;
  EXAMPLES[idx].build();
  render();
  toast(`Loaded: ${EXAMPLES[idx].name}`,'ok');
}

// ── TOAST ───────────────────────────────────────────────
function toast(msg,type='inf') {
  const t=document.createElement('div');
  t.className=`toast ${type==='ok'?'ok':type==='warn'?'warn':'inf'}`;
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

// ── INIT ────────────────────────────────────────────────
renderPalette();
render();
</script>
</body>
</html>
